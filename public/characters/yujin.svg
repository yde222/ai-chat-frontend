  <path d="M 73 97 Q 83 93 93 97 Q 83 99 73 97Z" fill="white"/>
  <circle cx="83" cy="96.5" r="4.5" fill="#1a1a2e"/>
  <circle cx="83" cy="96.5" r="2.5" fill="#334155"/>
  <circle cx="84.5" cy="95" r="1.2" fill="white"/>
  <path d="M 107 97 Q 117 93 127 97 Q 117 99 107 97Z" fill="white"/>
