  <path d="M 73 89 L 93 87" stroke="#1a1a2e" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <path d="M 107 87 L 127 89" stroke="#1a1a2e" stroke-width="2.8" fill="none" stroke-linecap="round"/>
  <!-- 코 -->
  <path d="M 98 105 L 100 112 L 102 105" stroke="#d4a08a" stroke-width="1.2" fill="none"/>
  <!-- 입 (일자, 무표정) -->
  <path d="M 90 122 Q 100 124 110 122" stroke="#b07060" stroke-width="1.5" fill="none"/>
  <!-- 안경 (무테) -->
  <rect x="70" y="91" width="25" height="12" rx="6" ry="6" fill="none" stroke="#94a3b8" stroke-width="0.8" opacity="0.5"/>
  <rect x="105" y="91" width="25" height="12" rx="6" ry="6" fill="none" stroke="#94a3b8" stroke-width="0.8" opacity="0.5"/>
  <line x1="95" y1="96" x2="105" y2="96" stroke="#94a3b8" stroke-width="0.6" opacity="0.5"/>
  <!-- 목 + 셔츠 -->
  <rect x="88" y="143" width="24" height="12" fill="url(#yujin-skin)"/>
  <!-- 정장 칼라 -->
  <path d="M 70 155 L 85 150 L 100 165 L 115 150 L 130 155 L 125 175 L 75 175 Z" fill="#1e293b"/>
