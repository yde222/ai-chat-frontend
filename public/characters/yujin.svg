  <path d="M 80 42 Q 95 34 110 38" stroke="#404060" stroke-width="1" fill="none" opacity="0.4"/>
  <!-- 얼굴 -->
  <ellipse cx="100" cy="105" rx="40" ry="43" fill="url(#yujin-skin)"/>
