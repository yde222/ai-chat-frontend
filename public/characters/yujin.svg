<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="yujin-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1a2332"/>
      <stop offset="100%" style="stop-color:#0f1720"/>
    </radialGradient>
    <radialGradient id="yujin-skin" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#fce8d5"/>
      <stop offset="100%" style="stop-color:#f0d5be"/>
    </radialGradient>
  </defs>
  <!-- 배경 -->
  <circle cx="100" cy="100" r="100" fill="url(#yujin-bg)"/>
  <!-- 도시 실루엣 -->
  <rect x="20" y="170" width="8" height="30" fill="#2a3a4a" opacity="0.3"/>
  <rect x="32" y="165" width="6" height="35" fill="#2a3a4a" opacity="0.25"/>
  <rect x="160" y="168" width="10" height="32" fill="#2a3a4a" opacity="0.3"/>
  <rect x="175" y="172" width="7" height="28" fill="#2a3a4a" opacity="0.25"/>
